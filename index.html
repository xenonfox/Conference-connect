<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Conference Connect</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
<h2>Conference Connect</h2>
</nav>

<header class="hero">
<h1>Conference Connect</h1>
<p>Discover Conferences, Workshops, Webinars & FDPs</p>
</header>

<section>
<h2>Upcoming Events</h2>
<table id="eventsTable">
<thead>
<tr>
<th>Event</th>
<th>Date</th>
<th>Organizer</th>
<th>Link</th>
</tr>
</thead>
<tbody></tbody>
</table>
</section>

<script>
const sheetURL = "YOUR_SHEET_CSV_URL";

fetch(sheetURL)
.then(response => response.text())
.then(data => {
const rows = data.split("\n").slice(1);
const tbody = document.querySelector("#eventsTable tbody");

rows.forEach(row => {
const cols = row.split(",");
if(cols.length >= 4){
const tr = document.createElement("tr");
tr.innerHTML = `
<td>${cols[0]}</td>
<td>${cols[1]}</td>
<td>${cols[2]}</td>
<td><a href="${cols[3]}" target="_blank">Open</a></td>
`;
tbody.appendChild(tr);
}
});
});
</script>

</body>
</html>
